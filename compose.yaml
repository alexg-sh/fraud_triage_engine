services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      DB_BUSY_TIMEOUT: "5000"
      DB_JOURNAL_MODE: WAL
      QUEUE_CONNECTION: database
      CACHE_STORE: file
      SESSION_DRIVER: file
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    volumes:
      - app-storage:/var/www/html/storage
    command: php artisan serve --host=0.0.0.0 --port=8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      DB_BUSY_TIMEOUT: "5000"
      DB_JOURNAL_MODE: WAL
      QUEUE_CONNECTION: database
      CACHE_STORE: file
      SESSION_DRIVER: file
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - app-storage:/var/www/html/storage
    command: php artisan queue:work database --queue=triage,default --tries=1 --sleep=1
    entrypoint: ["sh", "-c", "until [ -f /var/www/html/storage/database/database.sqlite ]; do sleep 1; done; exec /usr/local/bin/docker-entrypoint \"$@\"", "--"]
    depends_on:
      - app
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  app-storage:
